<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SS TELECOM Management</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .input-group { margin-bottom: 10px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>SS TELECOM - প্রোডাক্ট এন্ট্রি</h1>
    <div class="input-group">
        <input type="text" id="pName" placeholder="পণ্যের নাম (যেমন: USB Cable)">
    </div>
    <div class="input-group">
        <input type="number" id="pPrice" placeholder="মূল্য">
    </div>
    <button onclick="addProduct()">যোগ করুন</button>

    <h2>স্টক লিস্ট</h2>
    <ul id="stockList"></ul>
</div>

<script>
    function addProduct() {
        let name = document.getElementById('pName').value;
        let price = document.getElementById('pPrice').value;
        if(name && price) {
            let li = document.createElement('li');
            li.textContent = name + " - " + price + " টাকা";
            document.getElementById('stockList').appendChild(li);
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
        } else {
            alert("সব ঘর পূরণ করুন!");
        }
    }
</script>

</body>
</html>
