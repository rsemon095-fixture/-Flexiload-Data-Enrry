<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Load Add</title>

<link rel="stylesheet" href="../css/load.css">

</head>

<body>

<div class="container">

<h2>💰 Flexiload Balance Add</h2>

<p id="selectedOperator" style="text-align:center;font-size:18px;font-weight:bold;color:#00bcd4;">
Operator : All
</p>

<div class="card">
<img src="../assets/logo/gp-png.png">
<label>GP</label>
<input type="number" id="gp" placeholder="৳ লিখুন">
</div>

<div class="card">
<img src="../assets/logo/robi-png.png">
<label>Robi</label>
<input type="number" id="robi" placeholder="৳ লিখুন">
</div>

<div class="card">
<img src="../assets/logo/banglalink-png.png">
<label>Banglalink</label>
<input type="number" id="bl" placeholder="৳ লিখুন">
</div>

<div class="card">
<img src="../assets/logo/airtel-png.png">
<label>Airtel</label>
<input type="number" id="airtel" placeholder="৳ লিখুন">
</div>

<div style="display:flex;gap:10px;margin-top:20px;">

<button onclick="history.back()" style="flex:1;">
⬅ Back
</button>

<button onclick="saveBalance()" style="flex:2;">
💾 SAVE
</button>

</div>

</div>

<script type="module" src="../js/load.js"></script>

</body>

</html>
