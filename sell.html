<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Entry</title>

    <link rel="stylesheet" href="../css/sell.css">
</head>
<body>

<div class="container">

    <h2>📱 Flexiload Sell Entry</h2>

    <div class="card">

        <label>Operator</label>

        <select id="operator">

            <option value="gp">GP</option>
            <option value="robi">Robi</option>
            <option value="banglalink">Banglalink</option>
            <option value="airtel">Airtel</option>

        </select>

    </div>

    <div class="card">

        <label>মোবাইল নাম্বার</label>

        <input
            type="tel"
            id="number"
            placeholder="01XXXXXXXXX"
            maxlength="11">

    </div>

    <div class="card">

        <label>লোডের পরিমাণ</label>

        <input
            type="number"
            id="amount"
            placeholder="৳ লিখুন">

    </div>

    <div class="card">

        <label>ক্যাশ পাওয়া গেছে</label>

        <input
            type="number"
            id="cash"
            placeholder="৳ লিখুন">

    </div>

    <button onclick="saveSell()">

        SELL SAVE

    </button>

</div>

<script src="../js/sell.js"></script>

</body>
  </html>
